<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Distributed Scheduler</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Go Distributed Scheduler</h1>
    <p class="muted">Live simulation — tasks generated, prioritized, and dispatched in real time.</p>
  </header>

  <section class="stats">
    <div class="stat-card">
      <span class="stat-label">Queue length</span>
      <span class="stat-value" id="queue-length">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Tasks dispatched</span>
      <span class="stat-value" id="tasks-dispatched">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Active nodes</span>
      <span class="stat-value" id="active-nodes">0</span>
    </div>
  </section>

  <section id="node-grid" class="node-grid"></section>

  <script src="app.js"></script>
</body>
</html>
